<div class="container mb-5 mt-4">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      
      <div class="card shadow-sm border-0 p-4" style="border-radius: 20px; background-color: #ffffff;">
        <div class="card-body text-center">
          
          <h5 class="fw-bold mb-3" style="color: #1e4570;">Estado de citas</h5>
          <p class="text-muted mb-0 small fw-bold">Próxima cita: Cardiología</p>
          <p class="text-muted mb-0 small fw-bold">Lunes, 25 de mayo de 2026</p>
          <p class="text-muted mb-0 small fw-bold">10H00 - Hospital Alcívar</p>

          <div class="mb-4 estado">
            <span class="fs-4 fw-bold p-3 rounded-pill" 
                  [style.color]="colorEstado" 
                  style="background-color: #f8f9fa; border: 1px solid #eeeeee;">
              ● {{ estadoCita }}
            </span>
          </div>

          <div class ="mb-4">
          <p class="text-muted small mb-4">Presiona el botón para verificar el estado de tu cita </p>
                    <button class="btn btn-outline-success rounded-pill px-4" 
                    (click)="cambiarEstado('Aprobada')">
              Revisar estado
            </button>  
          </div>

        </div>
      </div>

    </div>
  </div>
</div>
