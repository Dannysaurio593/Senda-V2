<!-- Aquí COMIENZA el componente del HEADER -->
<div class="container">
  <div class="row">
    <div class="col mt-2">
      <!-- Navbar: pasa la sección activa y escucha eventos de cambio de pantalla -->
      <!-- (alCambiarPantalla): evento del navbar que llama cambiarSeccion() para guardar en localStorage -->
      <app-navbar [seccionActiva]="seccionActiva" (alCambiarPantalla)="cambiarSeccion($event)"></app-navbar>
    </div>
  </div>
</div>
<!-- Aquí TERMINA el componente del HEADER -->

<!-- IMPORTANTE: Uso de NgSwitch para mostrar/ocultar componentes según la navegación -->
<!-- [ngSwitch]: evalúa la variable seccionActiva
     *ngSwitchCase: muestra el elemento solo si el caso coincide -->
<div class="main-content py-4" [ngSwitch]="seccionActiva">
   <!-- Sección Home (bienvenida) -->
  <div *ngSwitchCase="'home'" class="container">
    <div class="row">
      <div class="col mt-5">
        <p><i class="bi-emoji-smile"></i> ¡Bienvenido a tu espacio de trabajo!<br><br> Aquí iremos agregando todos los componentes de nuestra web.</p>
      </div>
    </div>
  </div>
 
  <!-- Componente: Ficha Médica del Paciente -->
  <app-ficha-de-paciente *ngSwitchCase="'ficha'"></app-ficha-de-paciente>
  
  <!-- Componente: Ingreso de Signos Vitales -->
  <app-ingreso-signos *ngSwitchCase="'signos'"></app-ingreso-signos>
</div>

<!-- Aquí insertamos el componente del FOOTER -->
<div class="container">
  <div class="row">
    <div class="col">
      <app-footer></app-footer>
    </div>
  </div>
</div>
