<div class="container mt-4">
  <div class="row justify-content-center">
    <!-- CARD 1: INGRESO DE DATOS -->
    <div class="col-md-6">
      <h2 class="fw-bold text-center" style="color: #2E5481;">📤 Componente PADRE <br> Ingreso de Datos</h2>
      <p class="text-center">Envía datos al HIJO con <strong>@Input</strong></p>
      
      <div class="card shadow-lg border-start border-4" style="border-color: #2E5481 !important;">
        <div class="card-header py-3" style="background-color: #F4F4F4;">
          <h5 class="card-title fw-bold mb-0" style="color: #2E5481;">📝 Formulario del Paciente</h5>
        </div>
        
        <div class="card-body p-4" style="background-color: #F4F4F4;">
          <form>
            <!-- Nombre -->
            <div class="mb-3">
              <label for="nombre" class="form-label fw-bold">Nombre:</label>
              <input type="text" class="form-control" id="nombre" [(ngModel)]="nombrePaciente" name="nombrePaciente" placeholder="Ingresa el nombre completo">
            </div>
            
            <!-- Código Expediente -->
            <div class="mb-3">
              <label for="codigo" class="form-label fw-bold">Código Expediente:</label>
              <input type="text" class="form-control" id="codigo" [(ngModel)]="codigoExpediente" name="codigoExpediente" placeholder="Ej: SENDA-2026-8834">
            </div>
            
            <!-- Edad -->
            <div class="mb-3">
              <label for="edad" class="form-label fw-bold">Edad:</label>
              <input type="number" class="form-control" id="edad" [(ngModel)]="edad" name="edad" placeholder="Ingresa la edad">
            </div>
            
            <!-- Tipo de Sangre -->
            <div class="mb-3">
              <label for="sangre" class="form-label fw-bold">Tipo de Sangre:</label>
              <select class="form-select" id="sangre" [(ngModel)]="tipoSangre" name="tipoSangre">
                <option value="">-- Selecciona --</option>
                <option value="O Positivo (O+)">O Positivo (O+)</option>
                <option value="A Positivo (A+)">A Positivo (A+)</option>
                <option value="B Positivo (B+)">B Positivo (B+)</option>
                <option value="AB Positivo (AB+)">AB Positivo (AB+)</option>
                <option value="O Negativo (O-)">O Negativo (O-)</option>
                <option value="A Negativo (A-)">A Negativo (A-)</option>
                <option value="B Negativo (B-)">B Negativo (B-)</option>
                <option value="AB Negativo (AB-)">AB Negativo (AB-)</option>
              </select>
            </div>
            
            <!-- Contacto de Emergencia -->
            <div class="mb-3">
              <label for="contacto" class="form-label fw-bold">Contacto de Emergencia:</label>
              <input type="text" class="form-control" id="contacto" [(ngModel)]="contactoEmergencia" name="contactoEmergencia" placeholder="Nombre del contacto">
            </div>
            
            <!-- Teléfono de Emergencia -->
            <div class="mb-3">
              <label for="telefono" class="form-label fw-bold">Teléfono de Emergencia:</label>
              <input type="tel" class="form-control" id="telefono" [(ngModel)]="telefonoEmergencia" name="telefonoEmergencia" placeholder="Ej: 098 765 4321">
            </div>
            
            <!-- Próxima Cita -->
            <div class="mb-3">
              <label for="cita" class="form-label fw-bold">Próxima Cita:</label>
              <input type="text" class="form-control" id="cita" [(ngModel)]="proximaCita" name="proximaCita" placeholder="Ej: Lunes 25 de Mayo - 10:00 AM">
            </div>
          </form>
        </div>
        
        <div class="card-footer text-center py-2" style="font-size: 0.85rem; background-color: #F4F4F4; color: #5A6B7B;">
          Los cambios se reflejan en tiempo real ⚡ (Two-way Binding con ngModel)
        </div>
      </div>
    </div>
  </div>
  
  <!-- CARD 2: VISUALIZACIÓN (Componente Hijo) -->
  <div class="row justify-content-center mt-4">
    <div class="col-md-6">
      <!-- MODAL LIGHTBOX - Mensaje de Confirmación con animación -->
      <div *ngIf="mostrarMensaje" class="modal-backdrop-senda">
        <div class="modal-content-senda">
          <div class="text-center">
            <div class="display-1 mb-3" style="font-size: 3rem;">✅</div>
            <h4 class="fw-bold mb-3" style="color: #2E5481;">¡Éxito!</h4>
            <p class="fs-6" style="color: #555;">{{ mensajeGuardado }}</p>
            <p class="small mt-4" style="color: #999;">Desaparecerá en 3 segundos...</p>
          </div>
        </div>
      </div>
      
      <app-reporte-paciente 
        [nombrePaciente]="nombrePaciente"
        [codigoExpediente]="codigoExpediente"
        [edad]="edad"
        [tipoSangre]="tipoSangre"
        [contactoEmergencia]="contactoEmergencia"
        [telefonoEmergencia]="telefonoEmergencia"
        [fechaActual]="fechaActual"
        [proximaCita]="proximaCita"
        [colorEdadAlta]="colorEdadAlta"
        [colorEdadNormal]="colorEdadNormal"
        [colorSangreOPositivo]="colorSangreOPositivo"
        [colorSangreOtros]="colorSangreOtros"
        (fichaguardada)="onFichaGuardada($event)">
      </app-reporte-paciente>
    </div>
  </div>
</div>
